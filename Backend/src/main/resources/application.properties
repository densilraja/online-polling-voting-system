spring.application.name=Backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# \u2705 FIX: Tell Jackson to serialize/deserialize LocalDateTime as a plain
# "2026-06-08T20:00:00" string \u2014 no UTC conversion, no timezone shift.
# Without this, Jackson may treat the value as UTC and shift it by +05:30
# when your JVM timezone is IST, causing the 5h30m offset you were seeing.
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

# application.properties
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB